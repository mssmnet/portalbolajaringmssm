<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournament | Portal Rasmi Bola Jaring MSSM</title>
    <link rel="stylesheet" href="../style.css">
    <!-- WAJIB TAMBAH: Font Awesome untuk ikon burger -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    
    <style>
        /* Tetapan Header Betul */
        header {
            background: #7B1E3A; /* Maroon */
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            box-shadow: 0 4px 15px rgba(0,0,0,.3);
            position: sticky;
            top: 0;
            z-index: 999;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo {
            width: 60px;
            height: 60px;
            object-fit: contain;
            background: transparent;
        }

        .header-title h1 { color: white; font-size: 22px; margin: 0; }
        .subtitle { color: #ffeb3b; font-weight: bold; margin: 0; font-size: 14px; }

        /* Navigasi ke Kanan */
        nav {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-left: auto; 
        }

        nav a, .dropdown-btn {
            color: white;
            text-decoration: none;
            padding: 10px 16px;
            border-radius: 8px;
            transition: .3s;
            font-weight: bold;
            background: none;
            border: none;
            font-size: 16px;
            cursor: pointer;
            font-family: inherit;
        }

        nav a:hover, nav a.active, .dropdown:hover .dropdown-btn {
            background: rgba(255,255,255,.15);
            color: #FFD700;
        }

        /* SUSUNAN STRUKTUR DROPDOWN */
        .dropdown {
            position: relative;
            display: inline-block;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            background: #7B1E3A;
            min-width: 240px;
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            padding: 10px 0;
            z-index: 1000;
        }

        .dropdown-content a {
            color: white;
            padding: 12px 20px;
            text-decoration: none;
            display: block;
            text-align: left;
            font-size: 15px;
            font-weight: 600;
            border-radius: 0;
        }

        .dropdown-content a:hover {
            background: #9b2b4d;
            color: #FFD700;
        }

        .dropdown-content hr {
            border: none;
            border-top: 1px solid rgba(255,255,255,0.2);
            margin: 5px 0;
        }

        .dropdown:hover .dropdown-content {
            display: block;
        }

        /* Background & Lain-lain */
        body {
            background-image: url('../images/bg-utama.jpg');
            background-size: cover;
            background-position: center top;
            background-attachment: fixed;
            background-color: #fce4ec;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }

        .title-section {
            background: rgba(255, 255, 255, 0.95);
            padding: 25px 20px;
            margin: 40px auto;
            max-width: 800px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }

        .tournament-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 30px; }

        .tournament-card {
            background: white;
            border-radius: 20px;
            padding: 0;
            overflow: hidden;
            width: 100%;
            max-width: 350px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            transition: 0.3s;
        }

        .card-banner { height: 170px; background-size: cover; background-position: center; }
        .mssm-bg { background-image: url('../images/melakabgcad.jpg'); }
        .liga-bg { background-image: linear-gradient(rgba(123, 30, 58, 0.3), rgba(123, 30, 58, 0.3)), url('../images/bgligakpm.jpg'); }
        .card-body { padding: 0 25px 30px 25px; text-align: center; }
        .card-icon { width: 70px; height: 70px; margin: -35px auto 15px auto; background: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 32px; border: 4px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .btn { display: inline-block; background: #7B1E3A; color: white; text-decoration: none; padding: 10px 30px; border-radius: 8px; font-weight: bold; margin-top: 15px; }

        /* ============================
           BURGER MENU (CSS TAMBAHAN)
        ============================ */
        .menu-toggle {
            display: none;
            font-size: 30px;
            color: white;
            background: none;
            border: none;
            cursor: pointer;
        }

        /* ============================
           MOBILE & TABLET (CSS TAMBAHAN)
        ============================ */
        @media (max-width: 768px) {
            header {
                flex-wrap: wrap;
                padding: 15px 20px;
            }
            .header-title h1 {
                font-size: 18px;
            }
            .subtitle {
                font-size: 12px;
            }
            .logo {
                width: 50px;
                height: 50px;
            }
            .menu-toggle {
                display: block; /* Munculkan ikon burger */
            }
            
            nav {
                display: none; /* Sembunyikan menu pada asalnya */
                width: 100%;
                flex-direction: column;
                margin-top: 20px;
                margin-left: 0;
                gap: 0;
            }
            nav.active {
                display: flex; /* Tunjuk menu bila butang ditekan */
            }
            nav a, .dropdown, .dropdown-btn {
                width: 100%;
                text-align: left;
                padding: 12px 15px;
                border-radius: 0;
            }
            .dropdown-content {
                position: static;
                display: none;
                box-shadow: none;
                width: 100%;
                background: #6d1733;
            }
            .dropdown:hover .dropdown-content {
                display: block;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <!-- DIBETULKAN: Tukar ../../ kepada ../ -->
            <img src="../images/mssmlogo.png" alt="Logo MSSM" class="logo">
            <div class="header-title">
                <h1>PORTAL BOLA JARING MSSM</h1>
                <p class="subtitle">Majlis Sukan Sekolah Malaysia</p>
            </div>
        </div>

        <!-- BUTANG BURGER -->
        <button class="menu-toggle" id="menu-toggle">
            <i class="fas fa-bars"></i>
        </button>

        <!-- TAMBAH ID NAV-MENU -->
        <nav id="nav-menu">
            <!-- DIBETULKAN: Tukar ../../ kepada ../ -->
            <a href="../index.html">Home</a>
            
            <!-- MENU DROPDOWN KEJOHANAN -->
            <div class="dropdown">
                <button class="dropdown-btn active">Kejohanan ▼</button>
                <div class="dropdown-content">
                    <a href="mssm2026/index.html">🏆 MSSM 2026</a>
                    <hr>
                    <a href="https://jsports.com.my/ligakpm/bolajaring" target="_blank">🏐 Liga Bola Jaring KPM</a>
                </div>
            </div>

            <!-- DIBETULKAN: Tukar ../../ kepada ../ -->
            <a href="../live.html">🔴 Live</a>
        </nav>
    </header>

    <main>
        <div class="title-section">
            <h1>Pilih Kejohanan</h1>
            <h2>Sila pilih kategori kejohanan di bawah</h2>
        </div>

        <div class="tournament-grid">
            <div class="tournament-card">
                <div class="card-banner mssm-bg"></div>
                <div class="card-body">
                    <div class="card-icon">🏆</div>
                    <h2>MSSM 2026</h2>
                    <p>📍 Melaka</p>
                    <p>📅 28 Ogos – 3 Sept 2026</p>
                    <a href="mssm2026/index.html" class="btn">Masuk</a> 
                </div>
            </div>

            <div class="tournament-card">
                <div class="card-banner liga-bg"></div>
                <div class="card-body">
                    <div class="card-icon">🏐</div>
                    <h2>Liga Bola Jaring KPM</h2>
                    <p>📍 Sirkit Akhir-Selangor</p>
                     <p>📅 8 Okt – 13 Okt 2026</p>
                    <a href="https://jsports.com.my/ligakpm/bolajaring" class="btn">Masuk</a>
                </div>
            </div>
        </div>
    </main>

    <!-- SCRIPT UNTUK BURGER MENU DI TELEFON -->
    <script>
        const menuToggle = document.getElementById("menu-toggle");
        const nav = document.getElementById("nav-menu");

        menuToggle.addEventListener("click", () => {
            nav.classList.toggle("active");
        });
    </script>
</body>
</html>
