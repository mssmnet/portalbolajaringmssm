/* ===========================
   STATUS BADGE PREMIUM
=========================== */

.status{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-width:150px;
    padding:8px 18px;
    border-radius:50px;
    font-size:13px;
    font-weight:700;
    letter-spacing:.3px;
    color:#fff;
    box-shadow:0 3px 8px rgba(0,0,0,.15);
}

/* 🔴 Belum Bermula */
.status-pending{
    background:linear-gradient(135deg,#eb5555);
}

/* 🟢 Tamat */
.status-selesai{
    background:linear-gradient(135deg,#22c55e,#15803d);
}

/* 🟡 Live */
.status-live{
    background:linear-gradient(135deg,#facc15,#f59e0b);
    color:#222;
    animation:pulse 1.2s infinite;
}

/* ⚫ Ditangguh */
.status-postponed{
    background:linear-gradient(135deg,#6b7280,#374151);
}

@keyframes pulse{

    0%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.05);
    }

    100%{
        transform:scale(1);
    }

}/* Toolbar (Bahagian maklumat dan cetak) */
