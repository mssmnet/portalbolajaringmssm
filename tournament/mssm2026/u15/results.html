<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keputusan Perlawanan | MSSM 2026 (B15)</title>
    <link rel="stylesheet" href="../../../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <style>
        /* CSS Utama untuk Hasil */
        .results-table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 18px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,.08); }
        .results-table th { background: #7B1E3A; color: #fff; padding: 18px; font-size: 16px; text-transform: uppercase; }
        .results-table td { padding: 16px; border-bottom: 1px solid #eee; text-align: center; vertical-align: middle; }
        
        /* Susunan Header & Button */
        .results-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; gap: 20px; }
        .results-title { flex: 1; text-align: center; }
        .results-title h2 { margin: 0; font-size: 32px; color: #7B1E3A; }
        
        .btn-print { background: #7B1E3A; color: white; border: none; padding: 12px 28px; border-radius: 40px; font-size: 15px; font-weight: 700; cursor: pointer; transition: .3s; }
        .btn-print:hover { background: #5d132c; transform: translateY(-2px); }

        /* Komponen Jadual */
        .team-cell { display: flex; align-items: center; gap: 12px; }
        .team-cell.right { justify-content: flex-end; }
        .team-logo { width: 50px; height: 50px; object-fit: contain; }
        .team-name { font-weight: 700; color: #333; display: block; }
        .score-box { display: flex; justify-content: center; align-items: center; gap: 10px; }
        .score { background: #7B1E3A; color: #fff; padding: 10px 18px; border-radius: 12px; font-size: 22px; font-weight: bold; }
        .group-badge { width: 45px; height: 45px; border-radius: 50%; background: #7B1E3A; color: #fff; display: flex; justify-content: center; align-items: center; font-weight: bold; margin: auto; }
        .result-badge { display: inline-block; background: #16a34a; color: white; padding: 7px 20px; border-radius: 30px; font-weight: bold; }

        /* Gaya untuk Footer (Maroon) */
        footer {
            background: #7B1E3A;
            color: #ffffff;
            text-align: center;
            padding: 20px;
            margin-top: 40px;
            font-size: 14px;
            font-weight: 500;
        }

        @media print {
            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
            header, nav, footer, .btn-print { 
                display: none !important; 
            }
            body { background: white; }
            .results-table { box-shadow: none; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <img src="../../../images/mssmlogo.png" class="logo" alt="Logo MSSM">
            <div class="header-title">
                <h1>PORTAL BOLA JARING MSSM</h1>
                <p class="subtitle">Majlis Sukan Sekolah Malaysia</p>
            </div>
        </div>
        <nav>
            <a href="../../mssm2026/index.html">HOME</a>
            <a href="../u12.html">BAWAH 12</a>
            <a href="../u15.html" class="active">BAWAH 15</a>
            <a href="../u18.html">BAWAH 18</a>
            <a href="live.html"> 🔴LIVE</a>
        </nav>
    </header>

    <main class="main-container" style="padding: 40px 20px; max-width: 1000px; margin: auto;">
        
        <div class="results-header">
            <div class="results-title">
                <h2><i class="fa-solid fa-square-poll-horizontal"></i> Keputusan Perlawanan</h2>
                <p>Kategori Bawah 15 MSSM 2026</p>
            </div>
            <button class="btn-print" onclick="window.print()">
                <i class="fa-solid fa-print"></i> Cetak / Simpan PDF
            </button>
        </div>

        <div class="table-container">
            <table class="results-table" id="results-table">
                <thead>
                    <tr>
                        <th style="width:8%;">No.</th>
                        <th style="width:10%;">Kumpulan</th>
                        <th style="width:28%;">Pasukan 1</th>
                        <th style="width:16%;">Skor</th>
                        <th style="width:28%;">Pasukan 2</th>
                        <th style="width:20%;">Keputusan</th>
                    </tr>
                </thead>
                <tbody id="resultsBody">
                    <tr>
                        <td colspan="6" style="text-align:center; padding: 20px; font-style: italic; color: #888;">
                            Memuatkan keputusan perlawanan B15...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <footer>
        <p>© 2026 Portal Rasmi Bola Jaring MSSM. Hak Cipta Terpelihara.</p>
    </footer>

    <!-- KOD JAVASCRIPT DIRECT LINK KHUSUS UNTUK TAB RESULT B15 -->
    <script>
        const sheetUrlB15Results = "https://docs.google.com/spreadsheets/d/1Oc_BowwyXJF8-AubPLmSompXQ5YUDp23LWesuOmQEMw/gviz/tq?tqx=out:json&sheet=RESULT";

        async function muatKeputusanB15() {
            const tableBody = document.getElementById("resultsBody");
            if (!tableBody) return;

            try {
                const response = await fetch(sheetUrlB15Results);
                const textData = await response.text();
                
                // Ekstrak teks gviz bertukar menjadi objek JSON
                const rawJson = JSON.parse(textData.substring(47).slice(0, -2));
                const rows = rawJson.table.rows;

                tableBody.innerHTML = ""; 

                const getLogo = (name) => {
                    const cleanName = name.toLowerCase().replace('mss ', '').trim();
                    return `../../../images/logo/${cleanName}.png`;
                };

                rows.forEach((row) => {
                    if (!row.c || row.c[0] === null) return;
                    const r = row.c;
                    const val = (index) => (r[index]?.f || r[index]?.v || "").toString().trim();

                    const noMatch  = val(0);
                    const kump     = val(1);
                    const team1    = val(2);
                    const skor1    = val(3);
                    const team2    = val(4);
                    const skor2    = val(5);
                    const pemenang = val(6);

                    if (noMatch.toLowerCase().includes("match") || noMatch.toLowerCase().includes("no") || noMatch === "") return;
                    
                    tableBody.innerHTML += `
                    <tr>
                        <td style="font-weight:bold;">${noMatch}</td>
                        <td><span class="group-badge">${kump}</span></td>
                        <td>
                            <div class="team-cell">
                                <img src="${getLogo(team1)}" class="team-logo" onerror="this.style.display='none'">
                                <div><div class="team-name">${team1}</div></div>
                            </div>
                        </td>
                        <td>
                            <div class="score-box">
                                <span class="score">${skor1 || 0}</span>
                                <span class="score-separator" style="font-weight:bold; font-size:18px;">-</span>
                                <span class="score">${skor2 || 0}</span>
                            </div>
                        </td>
                        <td>
                            <div class="team-cell right">
                                <div><div class="team-name">${team2}</div></div>
                                <img src="${getLogo(team2)}" class="team-logo" onerror="this.style.display='none'">
                            </div>
                        </td>
                        <td><span class="result-badge">${pemenang || "-"}</span></td>
                    </tr>`;
                });

                if (tableBody.innerHTML === "") {
                    tableBody.innerHTML = `<tr><td colspan="6" style="text-align:center; padding:20px;">Tiada data keputusan ditemui.</td></tr>`;
                }

                console.log("Data Keputusan B15 berjaya dipaparkan.");

            } catch (error) {
                console.error("Ralat memuatkan data sheet RESULT B15:", error);
                tableBody.innerHTML = `<tr><td colspan="6" style="text-align:center; color:red; padding:20px;">Gagal memuatkan keputusan. Sila pastikan tab bernama 'RESULT' wujud pada Google Sheet.</td></tr>`;
            }
        }

        window.addEventListener('DOMContentLoaded', muatKeputusanB15);
    </script>
</body>
</html>
